name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            app/package-lock.json
            app-mobile/package-lock.json

      - name: Install desktop deps
        run: npm ci
        working-directory: app

      - name: Build desktop
        run: npm run build
        working-directory: app

      - name: Install mobile deps
        run: npm ci
        working-directory: app-mobile

      - name: Build mobile
        run: npm run build
        working-directory: app-mobile

      - name: Merge mobile into desktop dist
        run: mkdir -p app/dist/home && cp -r app-mobile/dist/* app/dist/home/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

      - uses: actions/deploy-pages@v4
        id: deployment
